<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Nhóm 4</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    overflow: hidden;
    text-align: center;
    color: white;
}

/* Tiêu đề */
h1 {
    margin-top: 60px;
    font-size: 50px;
    text-shadow: 0 0 20px #00f7ff;
}

p {
    font-size: 18px;
    color: #ccc;
    margin-bottom: 60px;
}

/* Khu vực thành viên */
.container {
    display: flex;
    justify-content: center;
    gap: 80px;
    flex-wrap: wrap;
}
.video-box {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 40px;
}

/* Vòng tròn */
.member {
    text-decoration: none;
    color: white;
    text-align: center;
}

.circle {
    width: 235px;
    height: 235px;
    border-radius: 50%;
    overflow: hidden;
    transition: 0.4s;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}



.name {
    margin-top: 15px;
    font-size: 22px;
}
</style>
</head>

<body>

<h1>NHÓM 8</h1>
<p>Chúng tôi là những người bạn thân thiết, cùng nhau học tập và phát triển. Chúng tôi luôn hỗ trợ nhau trong mọi hoàn cảnh và chia sẻ những khoảnh khắc đáng nhớ bên nhau.</p>

<div class="container">

    <a href="loi.html" class="member loi">
        <div class="circle">
            <img src="images/loi.jpg">
        </div>
        <div class="name">Lợi</div>
    </a>

    <a href="dat.html" class="member dat">
        <div class="circle">
            <img src="images/dat.jpg">
        </div>
        <div class="name">Đạt</div>
    </a>

    <a href="son.html" class="member son">
        <div class="circle">
            <img src="images/son.jpg">
        </div>
        <div class="name">Sơn</div>
    </a>
    <div class="video-box">
    <a href="video.html" class="member">
        <div class="circle" style="background:#ff9800; display:flex; align-items:center; justify-content:center; font-size:50px;">
            🎬
        </div>
        <div class="name">Video Nhóm</div>
    </a>
</div>

</div>

</body>
</html>
